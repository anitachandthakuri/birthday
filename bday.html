<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yash ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="audio1" autoplay loop preload="auto">
        <source src="audio1.mp3" type="audio/mpeg">
    </audio>

    <!-- The container that forces everything to stay perfectly in the middle -->
    <div class="container">
        
        <div id="content">
            <!-- Put your birthday images and text right here inside the center container -->
            <img src="photo1.jpeg" style="max-width: 90%; border-radius: 15px; box-shadow: 0 0 15px rgba(255,223,0,0.6);">
            
            <p style="font-size: 1.5rem; margin-top: 15px;">
                A smile that can brighten even my toughest days ❤️
            </p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
